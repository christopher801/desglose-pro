<!-- public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#1e3c72"/>

  <!-- Window Icon -->
  <rect x="20" y="20" width="60" height="60" rx="6" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Vertical Divider -->
  <line x1="50" y1="20" x2="50" y2="80" stroke="white" stroke-width="3"/>
  
  <!-- Horizontal Divider -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="white" stroke-width="3"/>

  <!-- Small Gear (represents calculation/engine) -->
  <circle cx="75" cy="75" r="8" fill="#00d4ff"/>
  <circle cx="75" cy="75" r="3" fill="#1e3c72"/>

</svg>